<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bit Shift Visualizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    input, button, select {
      margin: 10px;
      padding: 8px;
      font-size: 16px;
    }
    .binary {
      font-family: monospace;
      font-size: 20px;
      margin-top: 20px;
    }
    .step {
      margin-top: 8px;
    }
    .meta {
      color: #444;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Bit Shift Visualizer</h1>

  <div>
    <label>Enter Binary Number:</label><br>
    <input type="text" id="binaryInput" placeholder="e.g. 00000101">
  </div>

  <div>
    <label>Bit Size:</label><br>
    <select id="bitSize">
      <option value="8">8-bit</option>
      <option value="16">16-bit</option>
    </select>
  </div>

  <div>
    <label>Direction:</label><br>
    <select id="direction">
      <option value="left">Left Shift</option>
      <option value="right">Right Shift</option>
    </select>
  </div>

  <div>
    <label>Move by (bits):</label><br>
    <input type="number" id="shiftAmount" value="1" min="1">
  </div>

  <button onclick="shiftBits()">Shift</button>
  <button onclick="resetState()">Reset</button>

  <div class="binary" id="output"></div>

  <script>
    let currentValue = null;
    let bitSize = 8;

    function getMask() {
      return (1 << bitSize) - 1;
    }

    function toBinaryString(value) {
      return value.toString(2).padStart(bitSize, '0');
    }

    function shiftBits() {
      let input = document.getElementById('binaryInput').value;
      let direction = document.getElementById('direction').value;
      let shift = parseInt(document.getElementById('shiftAmount').value);
      bitSize = parseInt(document.getElementById('bitSize').value);

      let outputDiv = document.getElementById('output');

      // initialize once
      if (currentValue === null) {
        if (!/^[01]+$/.test(input)) {
          outputDiv.innerText = "Invalid binary input.";
          return;
        }
        currentValue = parseInt(input, 2) & getMask();
      }

      outputDiv.innerHTML += `<div class="step">Start: ${toBinaryString(currentValue)}</div>`;

      for (let i = 0; i < shift; i++) {
        let dropped = 0;

        if (direction === "left") {
          dropped = (currentValue >> (bitSize - 1)) & 1;
          currentValue = (currentValue << 1) & getMask();
        } else {
          dropped = currentValue & 1;
          currentValue = (currentValue >> 1) & getMask();
        }

        outputDiv.innerHTML += `
          <div class="step">
            Step ${i + 1}: ${toBinaryString(currentValue)}
            <div class="meta">Dropped bit: ${dropped}</div>
          </div>
        `;
      }
    }

    function resetState() {
      currentValue = null;
      document.getElementById('output').innerHTML = "";
    }
  </script>

</body>
</html>
